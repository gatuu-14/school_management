{% extends 'core/base.html' %}

{% block content %}
<div class="form-container">
    <h2>Delete {{ type }}</h2>
    <p>Are you sure you want to delete "{{ object }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirm Delete</button>
        <a href="{% url type|lower|add:'_list' %}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
